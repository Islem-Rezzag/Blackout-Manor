name: Seed Balance

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fairness:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run fairness suite
        run: pnpm ci:fairness

      - name: Upload fairness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fairness-report
          path: |
            artifacts/fairness/latest/fairness-report.json
            apps/web/public/data/fairness-report.latest.json
